<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="timer-card">
      <h1>Pomodoro Timer</h1>
      <div class="progress-ring" aria-label="Pomodoro progress">
        <svg class="progress-svg" viewBox="0 0 240 240" width="240" height="240">
          <circle class="progress-ring-bg" cx="120" cy="120" r="114" />
          <circle id="progress-ring-fg" class="progress-ring-fg" cx="120" cy="120" r="114" />
        </svg>
        <span id="phase-label" class="mode-pill work">Work</span>
        <span class="timer-label">25:00</span>
      </div>
      <div class="control-panel">
        <button id="start-btn" type="button">Start</button>
        <button id="pause-btn" type="button">Pause</button>
      </div>
      <div class="session-panel">
        <div class="session-count">
          Sessions: <span id="session-count">0</span>
        </div>
        <button id="reset-sessions-btn" type="button">Reset sessions</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
